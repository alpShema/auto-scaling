#   # 13. SCALING POLICY
#   # Target tracking policy on average CPU utilisation.
#   # AWS automatically scales out when CPU exceeds the threshold
#   # and scales in when load drops — no separate scale-in policy needed.

#   CpuTargetTrackingPolicy:
#     Type: AWS::AutoScaling::ScalingPolicy
#     Properties:
#       AutoScalingGroupName: !Ref AutoScalingGroup
#       PolicyType: TargetTrackingScaling
#       EstimatedInstanceWarmup: 60
