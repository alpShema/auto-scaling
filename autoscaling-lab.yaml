# AWSTemplateFormatVersion: '2010-09-09'
# Description: >
#   Auto Scaling Lab - Alphonse Shema
#   Highly available, auto-scaling web tier using EC2 Auto Scaling and ALB.
#   Private EC2 instances behind a public ALB. Regional NAT Gateway for outbound
#   internet access. CPU-based target tracking scaling policy. GitSync enabled.


# Parameters:

#   EnvironmentName:
#     Type: String
#     Default: autoscaling-lab
#     Description: Prefix for all resource names and tags

#   VpcCIDR:
#     Type: String
#     Default: 10.0.0.0/16
#     Description: CIDR block for the VPC

#   PublicSubnet1CIDR:
#     Type: String
#     Default: 10.0.1.0/24
#     Description: Public Subnet AZ1 - for ALB

#   PublicSubnet2CIDR:
#     Type: String
#     Default: 10.0.2.0/24
#     Description: Public Subnet AZ2 - for ALB

#   PrivateSubnet1CIDR:
#     Type: String
#     Default: 10.0.3.0/24
#     Description: Private Subnet AZ1 - for EC2 instances

#   PrivateSubnet2CIDR:
#     Type: String
#     Default: 10.0.4.0/24
#     Description: Private Subnet AZ2 - for EC2 instances

#   InstanceType:
#     Type: String
#     Default: t3.micro
#     AllowedValues: [t3.micro, t3.small, t3.medium]
#     Description: EC2 instance type

#   LatestAmiId:
#     Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
#     Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

#   AsgMinSize:
#     Type: Number
#     Default: 1
#     Description: Minimum number of instances

#   AsgDesiredSize:
#     Type: Number
#     Default: 1
#     Description: Desired number of instances at launch

#   AsgMaxSize:
#     Type: Number
#     Default: 4
#     Description: Maximum number of instances

#   CpuScaleOutThreshold:
#     Type: Number
#     Default: 30
#     Description: CPU % that triggers scale-out


# Resources:

#   # 1. VPC

#   VPC:
#     Type: AWS::EC2::VPC
#     Properties:
#       CidrBlock: !Ref VpcCIDR
#       EnableDnsHostnames: true
#       EnableDnsSupport: true
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-vpc

#   # 2. INTERNET GATEWAY

#   InternetGateway:
#     Type: AWS::EC2::InternetGateway
#     Properties:
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-igw

#   InternetGatewayAttachment:
#     Type: AWS::EC2::VPCGatewayAttachment
#     Properties:
#       VpcId: !Ref VPC
#       InternetGatewayId: !Ref InternetGateway


#   # 3. SUBNETS
#   # Public subnets depend on the IGW attachment to ensure
#   # the gateway is fully attached before subnets are created.

#   PublicSubnet1:
#     Type: AWS::EC2::Subnet
#     DependsOn: InternetGatewayAttachment
#     Properties:
#       VpcId: !Ref VPC
#       CidrBlock: !Ref PublicSubnet1CIDR
#       AvailabilityZone: !Select [0, !GetAZs '']
#       MapPublicIpOnLaunch: true
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-public-subnet-az1
#         - Key: Tier
#           Value: Public

#   PublicSubnet2:
#     Type: AWS::EC2::Subnet
#     DependsOn: InternetGatewayAttachment
#     Properties:
#       VpcId: !Ref VPC
#       CidrBlock: !Ref PublicSubnet2CIDR
#       AvailabilityZone: !Select [1, !GetAZs '']
#       MapPublicIpOnLaunch: true
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-public-subnet-az2
#         - Key: Tier
#           Value: Public

#   PrivateSubnet1:
#     Type: AWS::EC2::Subnet
#     Properties:
#       VpcId: !Ref VPC
#       CidrBlock: !Ref PrivateSubnet1CIDR
#       AvailabilityZone: !Select [0, !GetAZs '']
#       MapPublicIpOnLaunch: false
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-private-subnet-az1
#         - Key: Tier
#           Value: Private

#   PrivateSubnet2:
#     Type: AWS::EC2::Subnet
#     Properties:
#       VpcId: !Ref VPC
#       CidrBlock: !Ref PrivateSubnet2CIDR
#       AvailabilityZone: !Select [1, !GetAZs '']
#       MapPublicIpOnLaunch: false
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-private-subnet-az2
#         - Key: Tier
#           Value: Private

#   # 4. ELASTIC IP + REGIONAL NAT GATEWAY
#   # Single NAT Gateway placed in PublicSubnet1. Both private
#   # subnets route outbound traffic through this gateway.

#   NatGatewayEIP:
#     Type: AWS::EC2::EIP
#     DependsOn: InternetGatewayAttachment
#     Properties:
#       Domain: vpc
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-nat-eip

#   NatGateway:
#     Type: AWS::EC2::NatGateway
#     Properties:
#       AllocationId: !GetAtt NatGatewayEIP.AllocationId
#       SubnetId: !Ref PublicSubnet1
#       ConnectivityType: public
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-nat


#   # 5. ROUTE TABLES
#   # Public subnets share one route table pointing to the IGW.

#   PublicRouteTable:
#     Type: AWS::EC2::RouteTable
#     Properties:
#       VpcId: !Ref VPC
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-public-rt

#   PublicRoute:
#     Type: AWS::EC2::Route
#     DependsOn: InternetGatewayAttachment
#     Properties:
#       RouteTableId: !Ref PublicRouteTable
#       DestinationCidrBlock: 0.0.0.0/0
#       GatewayId: !Ref InternetGateway

#   PublicSubnet1RTA:
#     Type: AWS::EC2::SubnetRouteTableAssociation
#     Properties:
#       SubnetId: !Ref PublicSubnet1
#       RouteTableId: !Ref PublicRouteTable

#   PublicSubnet2RTA:
#     Type: AWS::EC2::SubnetRouteTableAssociation
#     Properties:
#       SubnetId: !Ref PublicSubnet2
#       RouteTableId: !Ref PublicRouteTable

#   PrivateRouteTable:
#     Type: AWS::EC2::RouteTable
#     Properties:
#       VpcId: !Ref VPC
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-private-rt

#   PrivateRoute:
#     Type: AWS::EC2::Route
#     Properties:
#       RouteTableId: !Ref PrivateRouteTable
#       DestinationCidrBlock: 0.0.0.0/0
#       NatGatewayId: !Ref NatGateway

#   PrivateSubnet1RTA:
#     Type: AWS::EC2::SubnetRouteTableAssociation
#     Properties:
#       SubnetId: !Ref PrivateSubnet1
#       RouteTableId: !Ref PrivateRouteTable

#   PrivateSubnet2RTA:
#     Type: AWS::EC2::SubnetRouteTableAssociation
#     Properties:
#       SubnetId: !Ref PrivateSubnet2
#       RouteTableId: !Ref PrivateRouteTable

#   # 6. SECURITY GROUPS
#   # ALB SG: accepts HTTP from the internet.
#   # EC2 SG: accepts HTTP from the ALB only — no direct inbound access.
#   # Outbound rules are omitted; AWS allows all outbound by default.

#   ALBSecurityGroup:
#     Type: AWS::EC2::SecurityGroup
#     Properties:
#       GroupName: !Sub ${EnvironmentName}-alb-sg
#       GroupDescription: Allow HTTP from internet to ALB
#       VpcId: !Ref VPC
#       SecurityGroupIngress:
#         - IpProtocol: tcp
#           FromPort: 80
#           ToPort: 80
#           CidrIp: 0.0.0.0/0
#           Description: HTTP from internet
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-alb-sg

#   EC2SecurityGroup:
#     Type: AWS::EC2::SecurityGroup
#     Properties:
#       GroupName: !Sub ${EnvironmentName}-ec2-sg
#       GroupDescription: Allow HTTP from ALB only - no direct internet access
#       VpcId: !Ref VPC
#       SecurityGroupIngress:
#         - IpProtocol: tcp
#           FromPort: 80
#           ToPort: 80
#           SourceSecurityGroupId: !Ref ALBSecurityGroup
#           Description: HTTP from ALB only
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-ec2-sg


#   # 7. IAM ROLE FOR SSM SESSION MANAGER
#   # Allows connecting to instances via Session Manager without SSH.
#   # RoleName and InstanceProfileName are omitted so CloudFormation
#   # generates unique names — required for DCE sandbox accounts.

#   EC2SSMRole:
#     Type: AWS::IAM::Role
#     Properties:
#       AssumeRolePolicyDocument:
#         Version: '2012-10-17'
#         Statement:
#           - Effect: Allow
#             Principal:
#               Service: ec2.amazonaws.com
#             Action: sts:AssumeRole
#       ManagedPolicyArns:
#         - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-ssm-role

#   EC2InstanceProfile:
#     Type: AWS::IAM::InstanceProfile
#     Properties:
#       Roles:
#         - !Ref EC2SSMRole

#   # ─────────────────────────────────────────────
#   # 8. APPLICATION LOAD BALANCER
#   # Internet-facing ALB spread across both public subnets.
#   # ─────────────────────────────────────────────
#   ApplicationLoadBalancer:
#     Type: AWS::ElasticLoadBalancingV2::LoadBalancer
#     Properties:
#       Name: !Sub ${EnvironmentName}-alb
#       Scheme: internet-facing
#       Type: application
#       Subnets:
#         - !Ref PublicSubnet1
#         - !Ref PublicSubnet2
#       SecurityGroups:
#         - !Ref ALBSecurityGroup
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-alb

#   # ─────────────────────────────────────────────
#   # 9. TARGET GROUP
#   # Health check hits / on port 80. An instance must pass
#   # 2 consecutive checks to be marked healthy.
#   # ─────────────────────────────────────────────
#   ALBTargetGroup:
#     Type: AWS::ElasticLoadBalancingV2::TargetGroup
#     Properties:
#       Name: !Sub ${EnvironmentName}-tg
#       Port: 80
#       Protocol: HTTP
#       VpcId: !Ref VPC
#       TargetType: instance
#       HealthCheckProtocol: HTTP
#       HealthCheckPort: '80'
#       HealthCheckPath: /
#       HealthCheckIntervalSeconds: 30
#       HealthCheckTimeoutSeconds: 5
#       HealthyThresholdCount: 2
#       UnhealthyThresholdCount: 2
#       Tags:
#         - Key: Name
#           Value: !Sub ${EnvironmentName}-tg

#   # ─────────────────────────────────────────────
#   # 10. ALB LISTENER
#   # Forwards all HTTP traffic on port 80 to the target group.
#   # ─────────────────────────────────────────────
#   ALBListener:
#     Type: AWS::ElasticLoadBalancingV2::Listener
#     Properties:
#       LoadBalancerArn: !Ref ApplicationLoadBalancer
#       Port: 80
#       Protocol: HTTP
#       DefaultActions:
#         - Type: forward
#           TargetGroupArn: !Ref ALBTargetGroup

