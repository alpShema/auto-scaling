AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Auto Scaling Lab - Alphonse Shema
  Highly available, auto-scaling web tier using EC2 Auto Scaling and ALB.
  Private EC2 instances behind a public ALB. Regional NAT Gateway for outbound
  internet access. CPU-based target tracking scaling policy. GitSync enabled.


Parameters:

  EnvironmentName:
    Type: String
    Default: autoscaling-lab
    Description: Prefix for all resource names and tags

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    Description: CIDR block for the VPC

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24
    Description: Public Subnet AZ1 - for ALB

  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24
    Description: Public Subnet AZ2 - for ALB

  PrivateSubnet1CIDR:
    Type: String
    Default: 10.0.3.0/24
    Description: Private Subnet AZ1 - for EC2 instances

  PrivateSubnet2CIDR:
    Type: String
    Default: 10.0.4.0/24
    Description: Private Subnet AZ2 - for EC2 instances

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small, t3.medium]
    Description: EC2 instance type

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  AsgMinSize:
    Type: Number
    Default: 1
    Description: Minimum number of instances

  AsgDesiredSize:
    Type: Number
    Default: 1
    Description: Desired number of instances at launch

  AsgMaxSize:
    Type: Number
    Default: 4
    Description: Maximum number of instances

  CpuScaleOutThreshold:
    Type: Number
    Default: 30
    Description: CPU % that triggers scale-out


Resources:

  # 1. VPC

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-vpc

  # 2. INTERNET GATEWAY

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway


  # 3. SUBNETS
  # Public subnets depend on the IGW attachment to ensure
  # the gateway is fully attached before subnets are created.

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    DependsOn: InternetGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-az1
        - Key: Tier
          Value: Public

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    DependsOn: InternetGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PublicSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-subnet-az2
        - Key: Tier
          Value: Public

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private-subnet-az1
        - Key: Tier
          Value: Private

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: !Ref PrivateSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private-subnet-az2
        - Key: Tier
          Value: Private

  # 4. ELASTIC IP + REGIONAL NAT GATEWAY
  # Single NAT Gateway placed in PublicSubnet1. Both private
  # subnets route outbound traffic through this gateway.

  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-nat-eip

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      ConnectivityType: public
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-nat


  # 5. ROUTE TABLES
  # Public subnets share one route table pointing to the IGW.

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # 6. SECURITY GROUPS
  # ALB SG: accepts HTTP from the internet.
  # EC2 SG: accepts HTTP from the ALB only — no direct inbound access.
  # Outbound rules are omitted; AWS allows all outbound by default.

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-alb-sg
      GroupDescription: Allow HTTP from internet to ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from internet
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-alb-sg

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-ec2-sg
      GroupDescription: Allow HTTP from ALB only - no direct internet access
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: HTTP from ALB only
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ec2-sg


  # 7. IAM ROLE FOR SSM SESSION MANAGER
  # Allows connecting to instances via Session Manager without SSH.
  # RoleName and InstanceProfileName are omitted so CloudFormation
  # generates unique names — required for DCE sandbox accounts.

  EC2SSMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-ssm-role

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMRole

  # ─────────────────────────────────────────────
  # 8. APPLICATION LOAD BALANCER
  # Internet-facing ALB spread across both public subnets.
  # ─────────────────────────────────────────────
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-alb

  # ─────────────────────────────────────────────
  # 9. TARGET GROUP
  # Health check hits / on port 80. An instance must pass
  # 2 consecutive checks to be marked healthy.
  # ─────────────────────────────────────────────
  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPort: '80'
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-tg

  # ─────────────────────────────────────────────
  # 10. ALB LISTENER
  # Forwards all HTTP traffic on port 80 to the target group.
  # ─────────────────────────────────────────────
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ─────────────────────────────────────────────
  # 11. LAUNCH TEMPLATE
  # Installs Apache and the stress tool on every new instance.
  # Apache is started and enabled before the HTML page is written
  # so the service is ready as soon as the file exists.
  # Instance metadata is fetched using IMDSv2 (token-based).
  # ─────────────────────────────────────────────
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${EnvironmentName}-launch-template
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            # Update OS packages and install Apache and stress tool
            yum update -y
            yum install -y httpd stress

            # Start Apache and enable it to survive reboots
            systemctl enable httpd
            systemctl start httpd

            # Fetch instance metadata using IMDSv2 (token-based, required on AL2023)
            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" \
              -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")

            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/instance-id)
            PRIVATE_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/local-ipv4)
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" \
              http://169.254.169.254/latest/meta-data/placement/availability-zone)

            # Write the HTML page using placeholders.
            # The heredoc delimiter is quoted (HTMLEOF) so the shell does not
            # expand $INSTANCE_ID etc. inside the HTML — sed handles that below.
            cat > /var/www/html/index.html << 'HTMLEOF'
            <!DOCTYPE html>
            <html>
            <head>
              <title>Auto Scaling Lab</title>
              <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body { font-family: Arial, sans-serif; background: #EBF5FB;
                       display: flex; justify-content: center; align-items: center;
                       min-height: 100vh; }
                .card { background: white; border-radius: 16px; padding: 48px;
                        max-width: 680px; width: 90%;
                        box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
                h1 { color: #1F3864; margin-bottom: 8px; }
                .subtitle { color: #888; margin-bottom: 32px; font-size: 0.9em; }
                .info-row { display: flex; justify-content: space-between;
                            padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
                .label { color: #555; font-weight: bold; }
                .value { color: #1F3864; font-family: monospace; font-size: 0.95em; }
                .badges { margin-top: 24px; }
                .badge { display: inline-block; padding: 6px 16px;
                         border-radius: 20px; margin: 4px;
                         font-size: 0.82em; font-weight: bold; }
                .blue  { background: #2E75B6; color: white; }
                .green { background: #1E6B3C; color: white; }
                .orange{ background: #C55A11; color: white; }
                .stress-box { margin-top: 28px; padding: 16px;
                              background: #FFF3CD; border-radius: 8px;
                              border-left: 4px solid #FFC107; }
                .stress-box h3 { color: #856404; margin-bottom: 8px; }
                .stress-box code { background: #333; color: #fff;
                                   padding: 4px 8px; border-radius: 4px;
                                   font-size: 0.85em; display: block;
                                   margin-top: 6px; }
              </style>
            </head>
            <body>
              <div class="card">
                <h1>Auto Scaling Lab</h1>
                <p class="subtitle">Alphonse Shema - Highly Available Web Tier</p>
                <div class="info-row">
                  <span class="label">Instance ID</span>
                  <span class="value">INSTANCE_ID_PLACEHOLDER</span>
                </div>
                <div class="info-row">
                  <span class="label">Private IP</span>
                  <span class="value">PRIVATE_IP_PLACEHOLDER</span>
                </div>
                <div class="info-row">
                  <span class="label">Availability Zone</span>
                  <span class="value">AZ_PLACEHOLDER</span>
                </div>
                <div class="info-row">
                  <span class="label">Region</span>
                  <span class="value">REGION_PLACEHOLDER</span>
                </div>
                <div class="info-row">
                  <span class="label">Stack</span>
                  <span class="value">STACK_PLACEHOLDER</span>
                </div>
                <div class="badges">
                  <span class="badge blue">Behind ALB</span>
                  <span class="badge green">Private Subnet</span>
                  <span class="badge orange">Auto Scaling Group</span>
                </div>
                <div class="stress-box">
                  <h3>CPU Stress Test Command</h3>
                  <p>Run this from Session Manager to trigger scale-out:</p>
                  <code>stress --cpu 4 --timeout 300</code>
                  <p style="margin-top:8px;font-size:0.85em;color:#856404;">
                    Runs for 5 minutes. Watch Auto Scaling add instances
                    when CPU exceeds CPU_THRESHOLD_PLACEHOLDER%.
                  </p>
                </div>
              </div>
            </body>
            </html>
            HTMLEOF

            # Substitute placeholders with real instance values
            sed -i "s/INSTANCE_ID_PLACEHOLDER/$INSTANCE_ID/g"   /var/www/html/index.html
            sed -i "s/PRIVATE_IP_PLACEHOLDER/$PRIVATE_IP/g"     /var/www/html/index.html
            sed -i "s/AZ_PLACEHOLDER/$AZ/g"                     /var/www/html/index.html
            sed -i "s/REGION_PLACEHOLDER/${AWS::Region}/g"       /var/www/html/index.html
            sed -i "s/STACK_PLACEHOLDER/${AWS::StackName}/g"     /var/www/html/index.html
            sed -i "s/CPU_THRESHOLD_PLACEHOLDER/${CpuScaleOutThreshold}/g" /var/www/html/index.html

        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${EnvironmentName}-instance
              - Key: Project
                Value: !Ref EnvironmentName


  # 12. AUTO SCALING GROUP
  # Spans both private subnets across two AZs for high availability.
  # HealthCheckGracePeriod is set to 600 seconds to allow enough time
  # for yum update and Apache startup before the ALB begins health checks.

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    DependsOn: NatGateway
    Properties:
      AutoScalingGroupName: !Sub ${EnvironmentName}-asg
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.DefaultVersionNumber
      MinSize: !Ref AsgMinSize
      DesiredCapacity: !Ref AsgDesiredSize
      MaxSize: !Ref AsgMaxSize
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      TargetGroupARNs:
        - !Ref ALBTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 600
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-instance
          PropagateAtLaunch: true
        - Key: Project
          Value: !Ref EnvironmentName
          PropagateAtLaunch: true

  # 13. SCALING POLICY
  # Target tracking policy on average CPU utilisation.
  # AWS automatically scales out when CPU exceeds the threshold
  # and scales in when load drops — no separate scale-in policy needed.

  CpuTargetTrackingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      EstimatedInstanceWarmup: 60
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: !Ref CpuScaleOutThreshold
        DisableScaleIn: false


Outputs:

  ALBDNSName:
    Description: ALB DNS name - use this to access the application
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  ALBUrl:
    Description: Full URL to access the web application
    Value: !Sub http://${ApplicationLoadBalancer.DNSName}

  StressTestNote:
    Description: How to trigger scale-out
    Value: >
      1. Connect to any instance via Session Manager.
      2. Run: stress --cpu 4 --timeout 300
      3. Watch EC2 Auto Scaling add instances in the console.
      4. Refresh the ALB URL to see different instance IDs serving traffic.
